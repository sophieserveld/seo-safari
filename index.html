<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HX SEO Wordsearch</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pu:#542E91;--pud:#3B1F6E;--pum:#6B3DB8;
  --ye:#FDDC06;--gr:#00B0A6;--rd:#FF5F68;--or:#FFB55F;--bl:#3AA6FF;--vi:#925FFF;
  --wh:#fff;--dark:#232323;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--pu);color:#fff}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.fadein{animation:fadeUp .4s ease both}

/* LANDING */
#s-landing{
  background:var(--pu);
  align-items:center;
  justify-content:center;
  padding:28px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
#s-landing::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.04);top:-80px;right:-80px}
#s-landing::after{content:'';position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(253,220,6,.06);bottom:-60px;left:-60px}

.landing-inner{max-width:480px;width:100%}

.landing-title{font-size:clamp(30px,8vw,46px);font-weight:900;margin-bottom:8px}
.landing-title em{color:var(--ye);font-style:normal}

.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;text-align:left}
.step-row{display:flex;gap:12px;background:rgba(255,255,255,.07);border-radius:12px;padding:12px 14px}
.step-num{background:var(--ye);color:var(--pu);font-weight:900;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.step-text{font-size:13px;font-weight:700}

.begin-btn{
  background:var(--ye);color:var(--pu);
  font-weight:900;font-size:20px;
  padding:16px 52px;border:none;border-radius:60px;
  cursor:pointer;width:100%;max-width:300px;
}

/* GAME */
#s-game{flex-direction:column}

/* TIMER */
.timer-strip{background:#2A1550;border-radius:12px;padding:12px 16px;margin-bottom:10px;margin-top:4px}
.timer-display{font-size:28px;font-weight:900;color:var(--ye)}

.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:800}
.fc{color:var(--ye)}
.pbar-wrap{flex:1;background:rgba(255,255,255,.12);border-radius:50px;height:6px}
.pbar-fill{background:var(--ye);height:100%;border-radius:50px;width:0%}

/* SCROLL */
.game-scroll{flex:1;overflow-y:auto;padding:20px 14px 50px}

/* GRID */
.ws-grid-wrap{background:white;border-radius:10px;padding:5px;width:100%;max-width:420px;margin:0 auto}
.ws-grid{display:grid}
.wc{display:flex;align-items:center;justify-content:center;font-weight:900;color:#232323;aspect-ratio:1}
.wc.sel{background:rgba(84,46,145,.22)}
.wc.hit{color:#fff!important}

/* CHIPS */
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;margin:9px 0;justify-content:center}
.chip{font-size:9.5px;font-weight:800;padding:3px 10px;border-radius:50px;background:rgba(255,255,255,.1)}
.chip.found{background:var(--gr);color:#fff;text-decoration:line-through}

/* WIN */
.win-banner{display:none;background:var(--ye);color:var(--pu);border-radius:14px;padding:20px;text-align:center;margin-top:10px}
.win-time{font-size:42px;font-weight:900}

/* CONFETTI */
.cw{position:fixed;inset:0;pointer-events:none}
.cp{position:absolute;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="cw" id="cw"></div>

<div id="s-landing" class="screen active">
  <div class="landing-inner">
    <div class="landing-title">SEO <em>Wordsearch</em></div>
    <div class="steps">
      <div class="step-row"><div class="step-num">1</div><div class="step-text">Learn SEO terms</div></div>
      <div class="step-row"><div class="step-num">2</div><div class="step-text">Scroll to the grid</div></div>
      <div class="step-row"><div class="step-num">3</div><div class="step-text">Find all words</div></div>
    </div>
    <button class="begin-btn" onclick="startGame()">Let's Go</button>
  </div>
</div>

<div id="s-game" class="screen">
  <div class="game-scroll">

    <div class="timer-strip">
      <div class="timer-display" id="td">00:00</div>
    </div>

    <div class="progress-row">
      <div class="fc" id="fc">0 / 10 found</div>
      <div class="pbar-wrap"><div class="pbar-fill" id="pb"></div></div>
    </div>

    <div class="ws-grid-wrap" id="gwrap">
      <div class="ws-grid" id="wsg"></div>
    </div>

    <div class="chips-wrap" id="chips"></div>

    <div class="win-banner" id="wb">
      <h3>All found</h3>
      <div class="win-time" id="wt">--:--</div>
    </div>

  </div>
</div>

<script>
/* JS unchanged */
</script>

</body>
</html>
